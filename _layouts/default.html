<!DOCTYPE html>
<html lang="ko">
<head>
    {% include head.html %}
    <style>
      /* 모바일 토글 클릭 및 가려짐 방지를 위한 핵심 반응형 스타일 강제 제어 */
      
      /* 1. 데스크톱 기본 오프셋 여백 */
      .offset-header {
        padding-top: 140px !important;
      }

      /* 2. 고정 헤더 기본 스타일 및 터치 레이어 고정 */
      #header.header {
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        width: 100% !important;
        z-index: 10000 !important; /* 모바일에서 다른 요소가 위를 덮지 못하도록 레이어 최상위 고정 */
        background: #ffffff !important; 
        border-bottom: 1px solid #eee !important;
        padding: 15px 0 !important;
        height: 80px !important; 
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.05) !important;
      }
      
      #header.header .container {
        display: flex !important;
        justify-content: space-between !important;
        align-items: center !important;
        height: 100% !important;
      }
      
      #header.header .logo {
        margin: 0 !important;
        padding: 0 !important;
        font-size: 24px !important;
        line-height: 1 !important;
        z-index: 10001 !important;
      }
      
      #header.header .logo-title,
      #header.header .logo a {
        color: #111111 !important;
        font-weight: 700 !important;
        text-decoration: none !important;
      }

      #header.header .main-nav {
        padding: 0 !important;
        margin: 0 !important;
        z-index: 10001 !important;
      }
      
      #header.header .main-nav .nav .nav-item {
        margin-right: 25px !important;
        display: inline-block !important;
      }
      
      #header.header .main-nav .nav .nav-item a {
        color: #444444 !important;
        font-size: 14.5px !important;
        padding: 10px 5px !important;
        text-decoration: none !important;
      }
      
      #header.header .main-nav .nav .nav-item.active a,
      #header.header .main-nav .nav .nav-item a:hover {
        color: #6690b9 !important; 
        font-weight: 600 !important;
      }

      /* ====== 스마트폰 및 태블릿 (모바일 환경) 대응 미디어 쿼리 ====== */
      @media (max-width: 768px) {
        /* 본문 글자가 헤더 뒤로 파묻히지 않도록 모바일 전용 상단 여백 대폭 확장 */
        .offset-header {
          padding-top: 160px !important; /* 상단 여백을 충분히 늘려 박스가 가려지는 현상 해결 */
        }

        #header.header {
          height: auto !important;
          padding: 15px 0 !important;
          position: fixed !important; /* 고정 상태 유지 */
        }

        #header.header .container {
          flex-direction: column !important; /* 모바일에서는 로고와 메뉴를 정갈하게 위아래 혹은 배치 조정 */
          justify-content: center !important;
          align-items: center !important;
          gap: 12px !important;
        }

        /* 메뉴 항목들이 정중앙에 뭉치거나 터치 안 되는 오류 제어 */
        #header.header .main-nav {
          width: 100% !important;
          text-align: center !important;
        }

        #header.header .main-nav .navbar-collapse {
          display: block !important; /* 모바일에서 스크롤 흐름 및 터치 활성화 */
          visibility: visible !important;
        }

        #header.header .main-nav .nav {
          display: flex !important;
          flex-wrap: wrap !important; /* 화면 폭에 맞춰 자연스럽게 줄바꿈 */
          justify-content: center !important;
          gap: 8px 15px !important; /* 메뉴 글자끼리 터치 영역 겹치지 않게 간격 확보 */
          margin: 0 !important;
          padding: 0 !important;
        }

        #header.header .main-nav .nav .nav-item {
          margin-right: 0 !important; /* 모바일 간격 격자 초기화 */
          display: inline-block !important;
        }

        #header.header .main-nav .nav .nav-item a {
          font-size: 13.5px !important; /* 글자 크기 모바일 최적화 */
          padding: 6px 8px !important;  /* 터치가 원활하도록 클릭 가용 면적 확대 */
          display: block !important;
        }
        
        /* 모바일용 메뉴 토글 버튼 불필요 요소 제거 (항상 정갈하게 노출) */
        #header.header .navbar-toggle {
          display: none !important;
        }
      }
    </style>
</head>
<body>

    <!-- ====== 통합 공통 내비게이션 바 (모든 페이지 자동 연동 및 모바일 터치 오류 수정 완료) ====== -->
    <header id="header" class="header">
      <div class="container">
        <h1 class="logo pull-left">
          <a href="/">
            <span class="logo-title">{{ site.org_name }}</span>
          </a>
        </h1>
        <nav id="main-nav" class="main-nav navbar-right" role="navigation">
          <div class="navbar-collapse collapse" id="navbar-collapse">
            <ul class="nav navbar-nav">
              <li class="nav-item"><a href="/#promo">Home</a></li>
              <li class="nav-item"><a href="/#about">About</a></li>
              <li class="nav-item"><a href="/#What-We-Do">What We Do</a></li>
              <li class="nav-item"><a href="/#resources">Resources</a></li>
              <li class="nav-item"><a href="/#contact">Contact</a></li>
              <li class="nav-item"><a href="/seminar.html">AI Seminar</a></li>
              <li class="nav-item"><a href="/jeremiah.html">Jeremiah Project</a></li>
            </ul>
          </div>
        </nav>
      </div>
    </header>

    <!-- 각 개별 페이지들의 본문 알맹이가 정상 노출되는 곳 -->
    {{ content }}

</body>
</html>
