<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ site.org_name }}</title>
    {% include head.html %}
    <style>
      /* ====== 전역 모던 디자인 시스템 고정 ====== */
      :root {
        --font-sans: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
        --color-text-primary: #111111;
        --color-text-secondary: #444444;
        --color-border-tertiary: #e5e7eb;
        --theme-blue: #6690b9;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: var(--font-sans); background: #ffffff; color: var(--color-text-primary); -webkit-text-size-adjust: 100%; }

      /* ====== [데스크톱] 모든 페이지 상단 간격 고정 ====== */
      .offset-header, .hero, .promo, section, main, .main-container {
        padding-top: 140px !important; 
      }

      /* ====== 고정 헤더 프레임 제어 ====== */
      #header.header {
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        width: 100% !important;
        height: 80px !important; 
        background: #ffffff !important; 
        border-bottom: 1px solid var(--color-border-tertiary) !important;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.05) !important;
        display: block !important;
        z-index: 10000 !important;
      }
      
      #header.header .container {
        display: flex !important;
        justify-content: space-between !important;
        align-items: center !important;
        height: 100% !important;
        max-width: 1200px !important;
        margin: 0 auto !important;
        padding: 0 20px !important;
        width: 100% !important;
      }
      
      #header.header .logo {
        margin: 0 !important;
        padding: 0 !important;
        font-size: 22px !important;
        font-weight: 700 !important;
        float: none !important;
        text-align: left !important;
      }
      #header.header .logo a {
        color: var(--color-text-primary) !important;
        text-decoration: none !important;
        display: inline-block !important;
      }

      #header.header .main-nav {
        float: none !important;
        display: block !important;
      }
      #header.header .main-nav .nav {
        list-style: none !important;
        display: flex !important;
        flex-direction: row !important;
        align-items: center !important;
      }
      #header.header .main-nav .nav .nav-item {
        margin-right: 25px !important;
        display: inline-block !important;
        float: none !important;
      }
      #header.header .main-nav .nav .nav-item.last { margin-right: 0 !important; }
      #header.header .main-nav .nav .nav-item a {
        color: var(--color-text-secondary) !important;
        font-size: 15px !important;
        padding: 10px 5px !important;
        text-decoration: none !important;
        font-weight: 500 !important;
      }
      #header.header .main-nav .nav .nav-item a:hover { color: var(--theme-blue) !important; }

      .custom-hamburger-btn { display: none !important; }

      /* ====== 📱 [모바일] 환경 완전 고정 레시피 ====== */
      @media (max-width: 768px) {
        .offset-header, .hero, .promo, section, main, .main-container {
          padding-top: 110px !important; 
          padding-bottom: 2rem !important;
        }

        #header.header { height: 70px !important; }
        
        #header.header .container {
          display: flex !important;
          justify-content: space-between !important;
          align-items: center !important;
          padding: 0 20px !important;
        }

        /* 🍔 모바일 햄버거 우측 정렬 고정 */
        .custom-hamburger-btn {
          display: block !important;
          width: 22px !important;
          height: 16px !important;
          position: relative !important;
          cursor: pointer !important;
          background: none !important;
          border: none !important;
          z-index: 10005 !important;
        }
        .custom-hamburger-btn span {
          display: block !important;
          position: absolute !important;
          height: 2px !important;
          width: 100% !important;
          background: #111111 !important;
          border-radius: 2px !important;
          transition: all 0.2s ease-in-out !important;
        }
        .custom-hamburger-btn span:nth-child(1) { top: 0px !important; }
        .custom-hamburger-btn span:nth-child(2) { top: 7px !important; }
        .custom-hamburger-btn span:nth-child(3) { top: 14px !important; }

        /* 모바일 서랍 메뉴 */
        #header.header .navbar-collapse {
          position: absolute !important;
          top: 70px !important;
          left: 0 !important;
          width: 100% !important;
          background: #ffffff !important;
          border-bottom: 1px solid var(--color-border-tertiary) !important;
          padding: 0 20px !important; 
          max-height: 0 !important; 
          overflow: hidden !important;
          display: block !important; 
          visibility: hidden !important;
          transition: max-height 0.25s ease-in-out !important;
          box-shadow: 0 4px 10px rgba(0,0,0,0.05) !important;
          z-index: 10002 !important;
        }

        #header.header .navbar-collapse.mobile-open {
          max-height: 350px !important; 
          padding: 10px 20px !important;
          visibility: visible !important;
        }

        /* X자 변형 */
        .custom-hamburger-btn.toggle-active span:nth-child(1) { top: 7px !important; transform: rotate(135deg) !important; }
        .custom-hamburger-btn.toggle-active span:nth-child(2) { opacity: 0 !important; }
        .custom-hamburger-btn.toggle-active span:nth-child(3) { top: 7px !important; transform: rotate(-135deg) !important; }

        #header.header .main-nav .nav {
          display: flex !important;
          flex-direction: column !important;
          align-items: flex-start !important;
        }
        #header.header .main-nav .nav .nav-item {
          display: block !important;
          width: 100% !important;
        }
        #header.header .main-nav .nav .nav-item a {
          font-size: 15px !important;
          padding: 12px 0 !important; 
          display: block !important;
          border-bottom: 1px solid #f5f5f5 !important;
        }
        #header.header .main-nav .nav .nav-item.last a { border-bottom: none !important; }
        .navbar-toggle { display: none !important; }
      }
    </style>
</head>
<body>

    <header id="header" class="header">
      <div class="container">
        {% include header.html %}
      </div>
    </header>

    {{ content }}

    {% include scripts.html %}

    <script>
      document.addEventListener("DOMContentLoaded", function() {
        var btn = document.getElementById("js-hamburger-trigger");
        var box = document.getElementById("navbar-collapse");
        if (btn && box) {
          btn.addEventListener("click", function(e) {
            e.preventDefault();
            btn.classList.toggle("toggle-active");
            box.classList.toggle("mobile-open");
          });
        }
      });
    </script>
</body>
</html>
