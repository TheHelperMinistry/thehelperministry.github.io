<!DOCTYPE html>
<html lang="ko">
<head>
    {% include head.html %}
    <style>
      /* ====== 전역 디자인 시스템 변수 고정 ====== */
      :root {
        --font-sans: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
        --font-serif: 'Noto Serif KR', Georgia, serif;
        --color-text-primary: #111111;
        --color-text-secondary: #444444;
        --color-text-tertiary: #767676;
        --color-border-tertiary: #e5e7eb;
        --theme-blue: #6690b9;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: var(--font-sans); background: transparent; color: var(--color-text-primary); }

      /* ====== 데스크톱 환경 기본 구조 설정 ====== */
      
      /* 모든 하위 페이지의 최상단 박스(.hero 또는 .promo)가 헤더 뒤로 숨지 않도록 강제 오프셋 밀어내기 */
      .offset-header, .hero, .promo {
        padding-top: 140px !important; /* 데스크톱에서 안전 거리 확보 */
      }

      /* 헤더 상단 고정 */
      #header.header {
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        width: 100% !important;
        z-index: 10000 !important;
        background: #ffffff !important; 
        border-bottom: 1px solid var(--color-border-tertiary) !important;
        height: 80px !important; 
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.05) !important;
      }
      
      #header.header .container {
        display: flex !important;
        justify-content: space-between !important;
        align-items: center !important;
        height: 100% !important;
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 20px;
      }
      
      #header.header .logo {
        margin: 0 !important;
        padding: 0 !important;
        font-size: 24px !important;
        line-height: 1 !important;
      }
      
      #header.header .logo-title,
      #header.header .logo a {
        color: var(--color-text-primary) !important;
        font-weight: 700 !important;
        text-decoration: none !important;
      }

      /* 데스크톱 메뉴 스타일 */
      #header.header .main-nav .nav {
        list-style: none !important;
        margin: 0 !important;
        padding: 0 !important;
      }
      #header.header .main-nav .nav .nav-item {
        margin-right: 25px !important;
        display: inline-block !important;
      }
      #header.header .main-nav .nav .nav-item.last {
        margin-right: 0 !important;
      }
      #header.header .main-nav .nav .nav-item a {
        color: var(--color-text-secondary) !important;
        font-size: 14.5px !important;
        padding: 10px 5px !important;
        text-decoration: none !important;
        font-weight: 500;
        transition: color 0.2s ease;
      }
      #header.header .main-nav .nav .nav-item a:hover {
        color: var(--theme-blue) !important;
        font-weight: 600 !important;
      }

      /* 데스크톱에서는 햄버거 토글 스위치(체크박스)와 아이콘을 숨김 */
      #menu-toggle, .hamburger-icon {
        display: none !important;
      }

      /* ====== 📱 스마트폰 및 태블릿 모바일 환경 미디어 쿼리 ====== */
      @media (max-width: 768px) {
        /* 하위 페이지까지 통틀어 모바일에서 첫 박스가 무조건 안 가려지도록 상단 여백 절대 제어 */
        .offset-header, .hero, .promo, section[id] {
          padding-top: 130px !important; 
        }

        #header.header {
          height: 70px !important; /* 모바일에서는 헤더를 조금 더 날씬하게 조정 */
        }
        
        #header.header .container {
          position: relative !important;
          justify-content: space-between !important;
          flex-direction: row !important; /* 가로 정렬 유지 */
          gap: 0 !important;
        }

        /* 🍔 햄버거 아이콘 스타일 정의 (세 줄 선 형태) */
        .hamburger-icon {
          display: block !important;
          width: 24px;
          height: 18px;
          position: relative;
          cursor: pointer;
          z-index: 10005 !important;
        }
        .hamburger-icon span {
          display: block;
          position: absolute;
          height: 2px;
          width: 100%;
          background: var(--color-text-primary);
          border-radius: 2px;
          transition: all 0.25s ease-in-out;
        }
        .hamburger-icon span:nth-child(1) { top: 0px; }
        .hamburger-icon span:nth-child(2) { top: 8px; }
        .hamburger-icon span:nth-child(3) { top: 16px; }

        /* 모바일 전체 서랍 메뉴 숨김 기본 상태 */
        #header.header .navbar-collapse {
          position: absolute !important;
          top: 70px !important;
          left: 0 !important;
          width: 100% !important;
          background: #ffffff !important;
          border-bottom: 1px solid var(--color-border-tertiary) !important;
          padding: 15px 20px !important;
          max-height: 0 !important; /* 평소에는 높이를 0으로 숨김 */
          overflow: hidden !important;
          visibility: hidden !important;
          transition: max-height 0.3s ease-in-out, visibility 0.3s !important;
          box-shadow: 0 4px 10px rgba(0,0,0,0.05) !important;
          z-index: 10002 !important;
        }

        /* 모바일 메뉴 항목 리스트 세로 정렬 */
        #header.header .main-nav .nav {
          display: flex !important;
          flex-direction: column !important;
          align-items: flex-start !important;
          gap: 12px !important;
          width: 100% !important;
        }
        #header.header .main-nav .nav .nav-item {
          margin-right: 0 !important;
          display: block !important;
          width: 100% !important;
        }
        #header.header .main-nav .nav .nav-item a {
          font-size: 15px !important;
          padding: 8px 0 !important;
          display: block !important;
          border-bottom: 0.5px solid #f5f5f5;
        }

        /* 💡 핵심 작동 원리: 햄버거 스위치(체크박스)가 선택되면 메뉴판을 아래로 활짝 엶 */
        #menu-toggle:checked ~ .navbar-collapse {
          max-height: 350px !important; /* 메뉴가 담길 만큼 높이 확장 */
          visibility: visible !important;
        }

        /* 🍔 애니메이션: 클릭 시 세 줄 아이콘이 깔끔한 'X' 자 닫기 모양으로 변형 */
        #menu-toggle:checked ~ .hamburger-icon span:nth-child(1) {
          top: 8px;
          transform: rotate(135deg);
        }
        #menu-toggle:checked ~ .hamburger-icon span:nth-child(2) {
          opacity: 0;
          left: -60px;
        }
        #menu-toggle:checked ~ .hamburger-icon span:nth-child(3) {
          top: 8px;
          transform: rotate(-135deg);
        }
      }
    </style>
</head>
<body>

    <header id="header" class="header">
      <div class="container">
        <h1 class="logo pull-left">
          <a href="/">
            <span class="logo-title">{{ site.org_name }}</span>
          </a>
        </h1>
        
        <nav id="main-nav" class="main-nav navbar-right" role="navigation">
          <input type="checkbox" id="menu-toggle" style="display: none !important;">
          
          <label for="menu-toggle" class="hamburger-icon">
            <span></span>
            <span></span>
            <span></span>
          </label>
          
          <div class="navbar-collapse collapse" id="navbar-collapse">
            <ul class="nav navbar-nav">
              <li class="nav-item"><a href="/#promo">Home</a></li>
              <li class="nav-item"><a href="/#about">About</a></li>
              <li class="nav-item"><a href="/#What-We-Do">What We Do</a></li>
              <li class="nav-item"><a href="/#resources">Resources</a></li>
              <li class="nav-item"><a href="/#contact">Contact</a></li>
              <li class="nav-item"><a href="/seminar.html">AI Seminar</a></li>
              <li class="nav-item last"><a href="/jeremiah.html">Jeremiah Project</a></li>
            </ul>
          </div>
        </nav>
      </div>
    </header>

    {{ content }}

</body>
</html>
