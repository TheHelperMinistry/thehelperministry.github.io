<!DOCTYPE html>
<html lang="ko">
<head>
    {% include head.html %}
    <style>
      /* ====== 전역 디자인 시스템 변수 고정 ====== */
      :root {
        --font-sans: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
        --font-serif: 'Noto Serif KR', Georgia, serif;
        --color-text-primary: #111111;
        --color-text-secondary: #444444;
        --color-text-tertiary: #767676;
        --color-border-tertiary: #e5e7eb;
        --theme-blue: #6690b9;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: var(--font-sans); background: transparent; color: var(--color-text-primary); }

      /* ====== 데스크톱 환경 기본 구조 설정 ====== */
      
      /* 모든 하위 페이지의 최상단 박스가 헤더 뒤로 숨지 않도록 강제 오프셋 밀어내기 */
      .offset-header, .hero, .promo {
        padding-top: 140px !important; 
      }

      /* 헤더 상단 고정 */
      #header.header {
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        width: 100% !important;
        z-index: 10000 !important;
        background: #ffffff !important; 
        border-bottom: 1px solid var(--color-border-tertiary) !important;
        height: 80px !important; 
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.05) !important;
      }
      
      #header.header .container {
        display: flex !important;
        justify-content: space-between !important;
        align-items: center !important;
        height: 100% !important;
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 20px;
      }
      
      #header.header .logo {
        margin: 0 !important;
        padding: 0 !important;
        font-size: 24px !important;
        line-height: 1 !important;
      }
      
      #header.header .logo-title,
      #header.header .logo a {
        color: var(--color-text-primary) !important;
        font-weight: 700 !important;
        text-decoration: none !important;
      }

      /* 데스크톱 내비게이션 메뉴 목록 바 */
      #header.header .main-nav .nav {
        list-style: none !important;
        margin: 0 !important;
        padding: 0 !important;
      }
      #header.header .main-nav .nav .nav-item {
        margin-right: 25px !important;
        display: inline-block !important;
      }
      #header.header .main-nav .nav .nav-item.last {
        margin-right: 0 !important;
      }
      #header.header .main-nav .nav .nav-item a {
        color: var(--color-text-secondary) !important;
        font-size: 14.5px !important;
        padding: 10px 5px !important;
        text-decoration: none !important;
        font-weight: 500;
        transition: color 0.2s ease;
      }
      #header.header .main-nav .nav .nav-item a:hover {
        color: var(--theme-blue) !important;
        font-weight: 600 !important;
      }

      /* 데스크톱에서는 햄버거 토글 버튼 숨김 */
      .custom-hamburger-btn {
        display: none !important;
      }

      /* ====== 📱 스마트폰 및 태블릿 모바일 환경 미디어 쿼리 ====== */
      @media (max-width: 768px) {
        /* 하위 페이지까지 모바일에서 첫 박스가 절대 안 가려지도록 안전 거리 절대 고정 */
        .offset-header, .hero, .promo, section[id] {
          padding-top: 130px !important; 
        }

        #header.header {
          height: 70px !important; 
        }
        
        #header.header .container {
          position: relative !important;
          justify-content: space-between !important;
          flex-direction: row !important; 
          gap: 0 !important;
        }

        /* 🍔 햄버거 버튼 디자인 구성 */
        .custom-hamburger-btn {
          display: block !important;
          width: 24px;
          height: 18px;
          position: relative;
          cursor: pointer;
          background: none;
          border: none;
          z-index: 10005 !important;
        }
        .custom-hamburger-btn span {
          display: block;
          position: absolute;
          height: 2px;
          width: 100%;
          background: var(--color-text-primary);
          border-radius: 2px;
          transition: all 0.25s ease-in-out;
        }
        .custom-hamburger-btn span:nth-child(1) { top: 0px; }
        .custom-hamburger-btn span:nth-child(2) { top: 8px; }
        .custom-hamburger-btn span:nth-child(3) { top: 16px; }

        /* 외부 코드 방해를 차단하기 위해 강제 오버라이딩 숨김 기본 상태 설정 */
        #header.header .navbar-collapse {
          position: absolute !important;
          top: 70px !important;
          left: 0 !important;
          width: 100% !important;
          background: #ffffff !important;
          border-bottom: 1px solid var(--color-border-tertiary) !important;
          padding: 0 20px !important; /* 자바스크립트로 열릴 때 부드러운 패딩 효과 */
          max-height: 0 !important; /* 기본 높이 0 */
          overflow: hidden !important;
          display: block !important; /* 부트스트랩의 display: none 방해 방지 */
          visibility: hidden !important;
          transition: max-height 0.3s ease-in-out, padding 0.3s ease-in-out !important;
          box-shadow: 0 4px 10px rgba(0,0,0,0.05) !important;
          z-index: 10002 !important;
        }

        /* 💡 자바스크립트 활성화 클래스 스크립트 */
        #header.header .navbar-collapse.mobile-open {
          max-height: 350px !important; /* 메뉴가 열릴 때 높이 확장 */
          padding: 15px 20px !important;
          visibility: visible !important;
        }

        /* 🍔 애니메이션 효과 스크립트 결합 */
        .custom-hamburger-btn.toggle-active span:nth-child(1) {
          top: 8px;
          transform: rotate(135deg);
        }
        .custom-hamburger-btn.toggle-active span:nth-child(2) {
          opacity: 0;
          left: -60px;
        }
        .custom-hamburger-btn.toggle-active span:nth-child(3) {
          top: 8px;
          transform: rotate(-135deg);
        }

        /* 모바일 내비게이션 세로 레이아웃 고정 */
        #header.header .main-nav .nav {
          display: flex !important;
          flex-direction: column !important;
          align-items: flex-start !important;
          gap: 12px !important;
          width: 100% !important;
        }
        #header.header .main-nav .nav .nav-item {
          margin-right: 0 !important;
          display: block !important;
          width: 100% !important;
        }
        #header.header .main-nav .nav .nav-item a {
          font-size: 15px !important;
          padding: 8px 0 !important;
          display: block !important;
          border-bottom: 0.5px solid #f5f5f5;
        }
        
        /* 기존 테마의 토글 버튼 무력화 */
        #header.header .navbar-toggle {
          display: none !important;
        }
      }
    </style>
</head>
<body>

    <header id="header" class="header">
      <div class="container">
        <h1 class="logo pull-left">
          <a href="/">
            <span class="logo-title">{{ site.org_name }}</span>
          </a>
        </h1>
        
        <nav id="main-nav" class="main-nav navbar-right" role="navigation">
          <button type="button" class="custom-hamburger-btn" id="js-hamburger-trigger">
            <span></span>
            <span></span>
            <span></span>
          </button>
          
          <div class="navbar-collapse collapse" id="navbar-collapse">
            <ul class="nav navbar-nav">
              <li class="nav-item"><a href="/#promo">Home</a></li>
              <li class="nav-item"><a href="/#about">About</a></li>
              <li class="nav-item"><a href="/#What-We-Do">What We Do</a></li>
              <li class="nav-item"><a href="/#resources">Resources</a></li>
              <li class="nav-item"><a href="/#contact">Contact</a></li>
              <li class="nav-item"><a href="/seminar.html">AI Seminar</a></li>
              <li class="nav-item last"><a href="/jeremiah.html">Jeremiah Project</a></li>
            </ul>
          </div>
        </nav>
      </div>
    </header>

    {{ content }}

    <script>
      document.addEventListener("DOMContentLoaded", function() {
        var trigger = document.getElementById("js-hamburger-trigger");
        var menu = document.getElementById("navbar-collapse");
        
        if (trigger && menu) {
          trigger.addEventListener("click", function(e) {
            e.preventDefault();
            e.stopPropagation();
            
            // 클래스 교차 적용을 통해 메뉴 개폐 및 아이콘 X자 변형 제어
            trigger.classList.toggle("toggle-active");
            menu.classList.toggle("mobile-open");
          });
          
          // 메뉴가 열린 상태에서 빈 공간 터치 시 자동으로 메뉴 숨김 처리
          document.addEventListener("click", function(e) {
            if (!trigger.contains(e.target) && !menu.contains(e.target)) {
              trigger.classList.remove("toggle-active");
              menu.classList.remove("mobile-open");
            }
          });
        }
      });
    </script>

</body>
</html>
