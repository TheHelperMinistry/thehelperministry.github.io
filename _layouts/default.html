<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ site.org_name }}</title>
    {% include head.html %}
    <style>
      /* ====== 전역 디자인 규칙 고정 ====== */
      :root {
        --font-sans: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
        --color-text-primary: #111111;
        --color-text-secondary: #444444;
        --color-border-tertiary: #e5e7eb;
        --theme-blue: #6690b9;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: var(--font-sans); background: #ffffff; color: var(--color-text-primary); }

      /* ====== 모든 페이지 첫 섹션 여백 칼정렬 ====== */
      .offset-header, .hero, .promo, section, main, .main-container {
        padding-top: 140px !important; 
      }

      /* ====== 고정 상단 바 프레임 강제 제어 (높이 일치화) ====== */
      #unified-header {
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        width: 100% !important;
        height: 80px !important; /* 데스크톱 헤더 높이 절대 고정 */
        background: #ffffff !important; 
        border-bottom: 1px solid var(--color-border-tertiary) !important;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.05) !important;
        z-index: 10000 !important;
      }
      
      .header-flex-wrapper {
        display: flex !important;
        justify-content: space-between !important;
        align-items: center !important;
        height: 100% !important;
        max-width: 1200px !important;
        margin: 0 auto !important;
        padding: 0 20px !important;
        width: 100% !important;
      }
      
      /* 로고 레이아웃 정의 */
      .custom-logo {
        margin: 0 !important;
        padding: 0 !important;
        font-size: 22px !important;
        font-weight: 700 !important;
        line-height: 1 !important;
      }
      .custom-logo a {
        color: var(--color-text-primary) !important;
        text-decoration: none !important;
      }

      /* 데스크톱 메뉴 우측 정렬 */
      .custom-nav-frame { display: block !important; }
      .custom-nav-list {
        list-style: none !important;
        display: flex !important;
        flex-direction: row !important;
        align-items: center !important;
      }
      .custom-nav-list .nav-item {
        margin-right: 25px !important;
      }
      .custom-nav-list .nav-item.last { margin-right: 0 !important; }
      .custom-nav-list .nav-item a {
        color: var(--color-text-secondary) !important;
        font-size: 15px !important;
        padding: 10px 5px !important;
        text-decoration: none !important;
        font-weight: 500 !important;
        transition: color 0.2s ease;
      }
      .custom-nav-list .nav-item a:hover { color: var(--theme-blue) !important; }

      .custom-hamburger-btn { display: none !important; }

      /* ====== 📱 [모바일 붕괴 해결] 스마트폰/태블릿 강제 배치 ====== */
      @media (max-width: 768px) {
        .offset-header, .hero, .promo, section, main, .main-container {
          padding-top: 110px !important; 
        }

        #unified-header {
          height: 70px !important; /* 모바일 헤더 높이 고정 */
        }

        /* 🍔 모바일 햄버거 버튼 우측 완전 정렬 고정 */
        .custom-hamburger-btn {
          display: block !important;
          width: 22px !important;
          height: 16px !important;
          position: relative !important;
          cursor: pointer !important;
          background: none !important;
          border: none !important;
          z-index: 10005 !important;
        }
        .custom-hamburger-btn span {
          display: block !important;
          position: absolute !important;
          height: 2px !important;
          width: 100% !important;
          background: #111111 !important;
          border-radius: 2px !important;
          transition: all 0.2s ease-in-out !important;
        }
        .custom-hamburger-btn span:nth-child(1) { top: 0px !important; }
        .custom-hamburger-btn span:nth-child(2) { top: 7px !important; }
        .custom-hamburger-btn span:nth-child(3) { top: 14px !important; }

        /* 모바일 전체 화면 서랍 메뉴 제어 */
        .custom-menu-box {
          position: absolute !important;
          top: 70px !important;
          left: 0 !important;
          width: 100% !important;
          background: #ffffff !important;
          border-bottom: 1px solid var(--color-border-tertiary) !important;
          padding: 0 20px !important; 
          max-height: 0 !important; 
          overflow: hidden !important;
          display: block !important; 
          visibility: hidden !important;
          transition: max-height 0.25s ease-in-out !important;
          box-shadow: 0 4px 10px rgba(0,0,0,0.05) !important;
          z-index: 10002 !important;
        }

        /* 열린 상태 */
        .custom-menu-box.box-open {
          max-height: 380px !important; 
          padding: 10px 20px !important;
          visibility: visible !important;
        }

        /* 🍔 삼선 아이콘 X 변형 공식 일치화 */
        .custom-hamburger-btn.btn-active span:nth-child(1) { top: 7px !important; transform: rotate(135deg) !important; }
        .custom-hamburger-btn.btn-active span:nth-child(2) { opacity: 0 !important; }
        .custom-hamburger-btn.btn-active span:nth-child(3) { top: 7px !important; transform: rotate(-135deg) !important; }

        .custom-nav-list {
          display: flex !important;
          flex-direction: column !important;
          align-items: flex-start !important;
        }
        .custom-nav-list .nav-item {
          display: block !important;
          width: 100% !important;
          margin-right: 0 !important;
        }
        .custom-nav-list .nav-item a {
          font-size: 15px !important;
          padding: 12px 0 !important; 
          display: block !important;
          border-bottom: 1px solid #f5f5f5 !important;
        }
        .custom-nav-list .nav-item.last a { border-bottom: none !important; }
      }
    </style>
</head>
<body>

    <!-- ====== 공통 완전 격리형 고정 헤더 ====== -->
    <header id="unified-header">
      <div class="header-flex-wrapper">
        {% include header.html %}
      </div>
    </header>

    <!-- 목사님의 개별 사역 원고가 훼손 없이 조립되는 위치 -->
    {{ content }}

    {% include scripts.html %}

    <!-- 상단바 1:1 매칭 터치 스크립트 고정 -->
    <script>
      document.addEventListener("DOMContentLoaded", function() {
        var triggerBtn = document.getElementById("custom-menu-trigger");
        var drawerBox = document.getElementById("custom-menu-box");
        
        if (triggerBtn && drawerBox) {
          triggerBtn.addEventListener("click", function(e) {
            e.preventDefault();
            triggerBtn.classList.toggle("btn-active");
            drawerBox.classList.toggle("box-open");
          });
        }
      });
    </script>
</body>
</html>
